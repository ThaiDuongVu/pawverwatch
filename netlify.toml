[build]
  command = "npm run build"
  publish = ".next"

[[headers]]
  for = "/*"
    [headers.values]
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/*"
  to = "/:splat"
  status = 200
  status = 304

    [redirects.rate_limit]
    window_limit = 100
    window_size = 60
    aggregate_by = ["ip"]

[[plugins]]
  package = "@netlify/plugin-nextjs"
